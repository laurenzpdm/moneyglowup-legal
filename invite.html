<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>You're invited · Money Glow Up</title>
<meta name="description" content="Join me on Money Glow Up — build a savings streak and glow up your money." />
<style>
  :root {
    --cream: #FBF7EF; --cream-2: #F4ECDD; --ink: #1C1B1A; --ink-soft: #55514B;
    --mint: #17B890; --mint-deep: #0E7C63; --border: #E5DCC9;
  }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0; min-height: 100vh;
    background: var(--cream); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex; align-items: center; justify-content: center; padding: 24px;
    line-height: 1.5;
  }
  .card { max-width: 420px; width: 100%; text-align: center; }
  .logo {
    width: 84px; height: 84px; border-radius: 26px; margin: 0 auto 22px;
    background: linear-gradient(140deg, var(--mint), var(--mint-deep));
    display: flex; align-items: center; justify-content: center;
    font-size: 46px; box-shadow: 0 10px 26px rgba(23,184,144,0.32);
  }
  .eyebrow {
    text-transform: uppercase; letter-spacing: 1.4px; font-size: 12px;
    font-weight: 800; color: var(--mint-deep); margin: 0 0 10px;
  }
  h1 { font-size: 27px; line-height: 1.25; margin: 0 0 8px; letter-spacing: -0.5px; }
  h1 .u { color: var(--mint-deep); }
  .sub { color: var(--ink-soft); margin: 0 0 30px; font-size: 16px; }
  .btn {
    display: block; width: 100%; text-decoration: none; cursor: pointer;
    border: none; font-family: inherit;
    border-radius: 16px; padding: 17px 18px; font-weight: 800; font-size: 17px;
    transition: transform .06s ease, opacity .2s ease;
  }
  .btn:active { transform: scale(0.98); }
  .btn-primary { color: #fff; background: linear-gradient(140deg, var(--mint), var(--mint-deep)); box-shadow: 0 8px 20px rgba(23,184,144,0.30); }
  .btn-store {
    color: var(--ink); background: #fff; border: 1px solid var(--border);
    margin-top: 14px; opacity: 0; pointer-events: none;
    max-height: 0; padding-top: 0; padding-bottom: 0; overflow: hidden;
    transition: opacity .3s ease, max-height .3s ease, padding .3s ease, margin .3s ease;
  }
  .btn-store.show { opacity: 1; pointer-events: auto; max-height: 80px; padding-top: 17px; padding-bottom: 17px; }
  .btn-store span { display: block; font-weight: 400; font-size: 13px; color: var(--ink-soft); margin-top: 3px; }
  footer { margin-top: 34px; color: var(--ink-soft); font-size: 13px; }
  footer a { color: var(--mint-deep); }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">🐷</div>
    <p class="eyebrow">You're invited</p>
    <h1><span class="u" id="who">@friend</span> invites you to<br />Money Glow Up 🐷</h1>
    <p class="sub">Build a savings streak, hit money goals, and glow up together.</p>

    <button class="btn btn-primary" id="open">Open in app</button>
    <a class="btn btn-store" id="store" href="https://apps.apple.com/app/id6786810935">
      Get the app<span>Download Money Glow Up on the App Store</span>
    </a>

    <footer>© 2026 Thuemmler AI GmbH · <a href="./index.html">Money Glow Up</a></footer>
  </div>

<script>
  (function () {
    var params = new URLSearchParams(window.location.search);
    var raw = (params.get('u') || '').trim().replace(/^@+/, '');
    // Allow only safe username characters; fall back to a neutral label.
    var user = /^[A-Za-z0-9_.-]{1,40}$/.test(raw) ? raw : '';
    var label = user || 'A friend';
    document.getElementById('who').textContent = user ? '@' + user : 'A friend';
    document.title = (user ? '@' + user : 'A friend') + ' invites you · Money Glow Up';

    var deepLink = 'moneyglowup://invite/' + encodeURIComponent(user || 'me');
    var store = document.getElementById('store');

    function openApp() { window.location.href = deepLink; }
    function revealStore() { store.classList.add('show'); }

    document.getElementById('open').addEventListener('click', function () {
      openApp();
      setTimeout(revealStore, 1500);
    });

    // Auto-attempt the deep link on load; if the app doesn't take over
    // within 1.5s, reveal the "Get the app" fallback.
    openApp();
    setTimeout(revealStore, 1500);
  })();
</script>
</body>
</html>
