<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Money Glow Up · Legal</title>
<style>
  :root {
    --cream: #FBF7EF; --ink: #1C1B1A; --ink-soft: #55514B;
    --mint: #17B890; --mint-deep: #0E7C63; --border: #E5DCC9;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh;
    background: var(--cream); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .card {
    max-width: 460px; width: 100%; text-align: center;
  }
  .logo {
    width: 68px; height: 68px; border-radius: 20px; margin: 0 auto 18px;
    background: linear-gradient(140deg, var(--mint), var(--mint-deep));
    display: flex; align-items: center; justify-content: center;
    font-size: 36px; box-shadow: 0 8px 22px rgba(23,184,144,0.30);
  }
  h1 { font-size: 26px; margin: 0 0 4px; letter-spacing: -0.4px; }
  .sub { color: var(--ink-soft); margin: 0 0 28px; font-size: 15px; }
  .links { display: flex; flex-direction: column; gap: 12px; }
  a.btn {
    display: block; text-decoration: none; color: var(--ink);
    background: #fff; border: 1px solid var(--border); border-radius: 14px;
    padding: 16px 18px; font-weight: 700; font-size: 17px;
    transition: transform .05s ease;
  }
  a.btn:active { transform: scale(0.98); }
  a.btn span { display:block; font-weight: 400; font-size: 13px; color: var(--ink-soft); margin-top: 3px; }
  footer { margin-top: 30px; color: var(--ink-soft); font-size: 13px; }
  footer a { color: var(--mint-deep); }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">🌱</div>
    <h1>Money Glow Up</h1>
    <p class="sub">Legal &amp; privacy · by Thuemmler AI GmbH</p>
    <div class="links">
      <a class="btn" href="./terms.html">Terms of Service<span>Subscriptions, conduct &amp; disclaimers</span></a>
      <a class="btn" href="./privacy.html">Privacy Policy<span>What we collect &amp; your rights</span></a>
    </div>
    <footer>
      © 2026 Thuemmler AI GmbH · <a href="mailto:maximilian.thuemmler@gmail.com">Contact</a>
    </footer>
  </div>
</body>
</html>
